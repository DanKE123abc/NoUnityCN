name: Fetch Unity Releases

on:
  schedule:
    # 每天北京时间 00:00 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '获取版本信息'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  fetch-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if today's file already exists
        id: check
        run: |
          TZ=Asia/Shanghai DATE=$(date +%Y-%m-%d)
          FILE_PATH="public/release_data/${DATE}.json"
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "file=${FILE_PATH}" >> $GITHUB_OUTPUT
          FORCE="${{ github.event.inputs.force }}"
          if [ "${FORCE}" = "true" ] || [ ! -f "${FILE_PATH}" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Will fetch releases (force=${FORCE})."
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Today's file already exists: ${FILE_PATH}, skipping."
          fi

      - name: Fetch all releases from Unity API
        if: steps.check.outputs.exists == 'false'
        run: node .github/scripts/fetch-releases.mjs
        env:
          OUTPUT_FILE: ${{ steps.check.outputs.file }}

      - name: Commit and push
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "public/release_data/${{ steps.check.outputs.date }}.json"
          git commit -m "chore: update release data ${{ steps.check.outputs.date }}"
          git push
